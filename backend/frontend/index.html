<!DOCTYPE html>
<html>

<head>
<title>Jenkins Fullstack App</title>
</head>

<body>

<h1>Jenkins Fullstack Deployment</h1>

<button onclick="loadData()">Check Backend</button>

<p id="result"></p>

<script>

function loadData(){

fetch("http://localhost:5000")
.then(res => res.text())
.then(data => {

document.getElementById("result").innerText = data

})

}

</script>

</body>

</html>
